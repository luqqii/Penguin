
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
text-align:center;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.hidden{display:none;}

h1{
font-size:clamp(32px,6vw,60px);
margin-bottom:20px;
white-space:nowrap;
}

h2{
font-size:clamp(24px,5vw,40px);
margin-bottom:20px;
white-space:nowrap;
}

p{
font-size:clamp(16px,3vw,20px);
max-width:600px;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff5e78;
color:white;
font-size:clamp(14px,2.5vw,18px);
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff3c5f;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
width:100%;
max-width:1100px;
}

.gallery-item{
aspect-ratio:3/4;
overflow:hidden;
border-radius:16px;
transition:.4s;
background:white;
padding:5px;
position:relative;
}

.gallery-item img,.gallery-item video{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
border-radius:12px;
cursor:pointer;
}

.gallery-item:hover{
transform:translateY(-8px);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.gallery-item:hover img,.gallery-item:hover video{
transform:scale(1.1);
}

.message{
max-width:700px;
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:15px;
line-height:1.6;
}

.heart{
position:fixed;
bottom:-20px;
color:red;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:confettiFall 3s linear forwards;
z-index:999;
}

@keyframes confettiFall{
0%{transform:translateY(0) rotate(0deg);opacity:1}
100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

.birthdayPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:clamp(24px,5vw,55px);
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.35);
padding:25px 45px;
border-radius:20px;
backdrop-filter:blur(10px);
animation:popup 3s ease forwards;
z-index:9999;
white-space:nowrap;
}

@keyframes popup{
0%{opacity:0;transform:translate(-50%,-60%) scale(0.6)}
20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
80%{opacity:1;transform:translate(-50%,-50%) scale(1)}
100%{opacity:0;transform:translate(-50%,-40%) scale(0.9)}
}

.gallery-item::after{
content:'❤️';
position:absolute;
top:50%; left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:40px;
opacity:0;
transition:all 0.4s ease;
}

.gallery-item:hover::after{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}

.sparkle{
position:fixed;
color:white;
font-size:12px;
animation:sparkle 2s linear forwards;
}

@keyframes sparkle{
0%{opacity:1;transform:scale(0)}
100%{opacity:0;transform:scale(2)}
}

.word{
position:fixed;
font-weight:bold;
animation:floatWord 5s linear forwards;
}

@keyframes floatWord{
0%{transform:translateY(0) scale(0.6);opacity:1}
100%{transform:translateY(-110vh) scale(1.2);opacity:0}
}

.finalPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:clamp(22px,5vw,40px);
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.35);
padding:25px 45px;
border-radius:20px;
backdrop-filter:blur(10px);
animation:pulseHeart 3s ease forwards;
z-index:9999;
white-space:nowrap;
}

@keyframes pulseHeart{
0%{transform:translate(-50%,-50%) scale(0.8);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

@media (max-width:600px){

h1,h2{
white-space:nowrap;
font-size:clamp(18px,5vw,26px);
}

.birthdayPopup,.finalPopup{
white-space:nowrap;
font-size:clamp(18px,5vw,26px);
padding:18px 25px;
}

.gallery{
grid-template-columns:1fr 1fr;
gap:10px;
width:100%;
padding:0 10px;
}

.gallery-item{
width:100%;
aspect-ratio:1/1;
}

}
</style>
</head>

<body>

<audio id="birthdayMusic" preload="auto" loop>
<source src="birthday.mp3" type="audio/mpeg">
Your browser does not support audio.
</audio>

<section>
<h1>Happy Birthday Penguin ❤️</h1>
<p>Today is all about celebrating you and the happiness you bring into my life.</p>
<button onclick="startCelebration()">Shall We Please? 🎉</button>
</section>

<section id="memories" class="hidden">
<h2>Our Memories 📸</h2>

<div class="gallery">
<div class="gallery-item"><img src="img1.jpeg"></div>
<div class="gallery-item"><img src="img2.jpeg"></div>
<div class="gallery-item"><img src="img3.jpeg"></div>
<div class="gallery-item"><img src="img4.jpeg"></div>
<div class="gallery-item"><img src="img5.jpeg"></div>
<div class="gallery-item"><img src="img6.jpeg"></div>
<div class="gallery-item"><img src="img7.jpeg"></div>
<div class="gallery-item"><img src="img8.jpeg"></div>
<div class="gallery-item"><img src="img9.jpeg"></div>
<div class="gallery-item"><img src="img10.jpeg"></div>
<div class="gallery-item"><img src="img11.jpeg"></div>
<div class="gallery-item"><img src="img12.jpeg"></div>
<div class="gallery-item"><img src="img13.jpeg"></div>
<div class="gallery-item"><img src="img14.jpeg"></div>
<div class="gallery-item"><img src="img15.jpeg"></div>

<div class="gallery-item">
<video autoplay muted loop playsinline>
<source src="snap.mp4" type="video/mp4">
</video>
</div>
</div>

<br>
<button onclick="openMessage()">A Wish 💌</button>
</section>

<section id="message" class="hidden">
<h2>Something From My Heart ❤️</h2>
<div class="message">
<p id="typedMessage"></p>
<button onclick="specialSurprise()">A Little Surprise 🎁</button>
</div>
</section>

<script>

function startCelebration(){

document.body.style.overflow="auto";

const music=document.getElementById("birthdayMusic");
music.volume=1;
music.play().catch(()=>{});

const popup=document.createElement("div");
popup.className="birthdayPopup";
popup.innerHTML="Happy Birthday Cutie ❤️";
document.body.appendChild(popup);
setTimeout(()=>{popup.remove();},3000);

const colors=["#ff4d6d","#ffbe0b","#3a86ff","#ff006e","#8338ec","#fb5607"];

for(let i=0;i<150;i++){
const confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
confetti.style.animationDelay=Math.random()*0.5+"s";
document.body.appendChild(confetti);
setTimeout(()=>{confetti.remove();},3000);
}

const memories=document.getElementById("memories");
memories.classList.remove("hidden");
memories.scrollIntoView({behavior:"smooth"});
}

function openMessage(){

const message=document.getElementById("message");
message.classList.remove("hidden");
message.scrollIntoView({behavior:"smooth"});

const fullMessage=`Happiest Birthday 🎉🥳🎉 My Cutiest Penguin ❤️
Your smile makes everything brighter and your presence makes every moment special.
Thank you so much for being such a beautiful soul and my bestie ❤️
I hope this year brings endless Happiness, Success, and Love for my Reinu 👑
May You achieve everything you ever wished for and may this bond always stay much more stronger and we always stay together ❤️
Once again wishing you a Happiest Birthday 🎉🥳🎉
Have a good one cutie ❤️
— Your Annoying Bestie who is really Happy for you and cares about you a lot ❤️`;

let i=0;
const typed=document.getElementById("typedMessage");
typed.innerHTML="";

function typeWriter(){
if(i<fullMessage.length){
typed.innerHTML+=fullMessage.charAt(i)=="\n"?"<br>":fullMessage.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

typeWriter();
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHeart,300);

const words=[
"Happy BirthdayBestie 💖",
"Happy Birthday Cutie ❤️",
"Smile ✨",
"Happy Birthday Bestie Forever 🤍",
"Happy Birthday Penguin 🐧",
"Happy Birthday Reinu 👑"
];

function createWord(){
const word=document.createElement("div");
word.classList.add("word");
word.innerHTML=words[Math.floor(Math.random()*words.length)];
word.style.left=Math.random()*100+"vw";
word.style.fontSize=(Math.random()*20+12)+"px";
word.style.color=["#b3003c","#1f4fb2","#99004d","#5a189a","#004b6b","#2d6a4f"][Math.floor(Math.random()*6)];
document.body.appendChild(word);
setTimeout(()=>{word.remove();},5000);
}

setInterval(createWord,1000);

function createSparkle(){
const sparkle=document.createElement("div");
sparkle.classList.add("sparkle");
sparkle.innerHTML="✨";
sparkle.style.left=Math.random()*100+"vw";
sparkle.style.top=Math.random()*100+"vh";
sparkle.style.fontSize=(Math.random()*15+8)+"px";
document.body.appendChild(sparkle);
setTimeout(()=>{sparkle.remove();},2000);
}

setInterval(createSparkle,300);

function specialSurprise(){

const colors=["#ff4d6d","#ffbe0b","#3a86ff","#ff006e","#8338ec","#fb5607"];

for(let i=0;i<200;i++){
const confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
confetti.style.animationDelay=(Math.random()*0.5)+"s";
document.body.appendChild(confetti);
setTimeout(()=>{confetti.remove();},3000);
}

const final=document.createElement("div");
final.className="finalPopup";
final.innerHTML="You are truly special to me Cutie ❤️";
document.body.appendChild(final);
setTimeout(()=>{final.remove();},5000);
}

const galleryItems=document.querySelectorAll(".gallery-item img,.gallery-item video");

galleryItems.forEach(item=>{
item.addEventListener("click",()=>{
const overlay=document.createElement("div");
overlay.style.position="fixed";
overlay.style.top="0";
overlay.style.left="0";
overlay.style.width="100%";
overlay.style.height="100%";
overlay.style.background="rgba(0,0,0,0.85)";
overlay.style.display="flex";
overlay.style.justifyContent="center";
overlay.style.alignItems="center";
overlay.style.zIndex="99999";

const clone=item.cloneNode(true);
clone.style.width="80%";
clone.style.height="80%";
clone.style.objectFit="contain";
clone.style.borderRadius="12px";

overlay.appendChild(clone);
overlay.addEventListener("click",()=>{overlay.remove();});
document.body.appendChild(overlay);
});
});

</script>

</body>
</html>
